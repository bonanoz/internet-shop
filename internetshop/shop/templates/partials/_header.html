{% load static %}
<header class="site-header">
    <div class="container header-inner">
        <a href="{% url 'home' %}" class="brand">{{ site_info.brand_name }}</a>

        <nav class="nav" aria-label="Основная навигация">
            <a href="{% url 'catalog_list' %}">Каталог</a>
            <a href="{% url 'b2b_page' %}">Бизнесу</a>
            <a href="{% url 'designers_page' %}">Дизайнерам</a>
            <a href="{% url 'about_page' %}">О нас</a>
            <a href="{% url 'delivery_payment_page' %}">Доставка</a>
            <a href="{% url 'faq_page' %}">FAQ</a>
            <a href="{% url 'contacts_page' %}">Контакты</a>
            <a href="tel:{{ site_info.phone_href }}" class="header-phone">{{ site_info.phone }}</a>
        </nav>

        <a href="{% url 'cart_detail' %}" class="header-cart" aria-label="Корзина">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 6h15l-1.5 9h-12z"></path>
                <path d="M6 6 5 3H2"></path>
                <circle cx="9" cy="20" r="1.4"></circle>
                <circle cx="18" cy="20" r="1.4"></circle>
            </svg>
            <span class="header-cart__count" data-cart-count{% if not cart.count %} hidden{% endif %}>{{ cart.count }}</span>
        </a>

        <button class="nav-toggle" aria-label="Меню" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>
